name: Run core

on:
  schedule:
    # 平日 16:00 JST (7:00 UTC)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

permissions:
  actions: read   # artifact のダウンロードに必要
  pages: write
  id-token: write

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      # 1. core リポジトリをチェックアウト
      - name: Checkout core repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.CORE_REPO }}
          token: ${{ secrets.CORE_REPO_PAT }}
          path: core

      # 2. 最新の artifact を取得してフォルダに展開
      - name: Download latest artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: run.yml
          name: core-artifact
          path: core/artifact
          if_no_artifact_found: warn   # 初回実行時は artifact がないため警告のみ

      # 3. Python のセットアップと依存インストール
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r core/requirements.txt

      # 4. 祝日判定
      - name: Check if holiday
        run: |
          python -c "
          import jpholiday
          from datetime import datetime, timezone
          today = datetime.now(timezone.utc).date()
          if jpholiday.is_holiday(today):
              print('Today is a holiday, cancelling workflow')
              exit(1)
          else:
              print('Today is not a holiday, proceeding')
          "

      # 5. run.py を実行
      - name: Run core/run.py
        env:
          CORE_SECRETS_LIST: ${{ secrets.CORE_SECRETS_LIST }}
        run: cd core && python run.py

      # 5.5 デバッグ: pages フォルダを確認
      - name: Debug - Check pages folder
        run: |
          if [ -d "core/pages" ]; then
            echo "pages folder exists"
            ls -la core/pages/
          else
            echo "ERROR: pages folder does not exist!"
          fi
          if [ -f "core/pages/index.html" ]; then
            echo "index.html exists"
          else
            echo "ERROR: index.html does not exist!"
          fi
          if [ -f "core/artifact/run.log" ]; then
            echo "=== run.py log ==="
            cat core/artifact/run.log
          else
            echo "ERROR: run.log does not exist!"
          fi

      # 6. artifact を保存
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-artifact
          path: core/artifact/
          retention-days: 90
          if-no-files-found: error

      # 7. pages を GitHub Pages に公開 (存在する場合)
      - name: Setup Pages
        if: hashFiles('core/pages/index.html') != ''
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: hashFiles('core/pages/index.html') != ''
        uses: actions/upload-pages-artifact@v3
        with:
          path: core/pages/

      - name: Deploy to GitHub Pages
        if: hashFiles('core/pages/index.html') != ''
        id: deployment
        uses: actions/deploy-pages@v4
