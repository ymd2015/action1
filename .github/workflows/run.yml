name: Run core

on:
  schedule:
    # 平日 16:00 JST (7:00 UTC)
    - cron: "0 7 * * 1-5"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      actions: read   # artifact のダウンロードに必要

    steps:
      # 1. core リポジトリをチェックアウト
      - name: Checkout core repository
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.CORE_REPO }}
          token: ${{ secrets.CORE_REPO_PAT }}
          path: core

      # 2. 最新の artifact を取得してフォルダに展開
      - name: Download latest artifact
        uses: dawidd6/action-download-artifact@v6
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          workflow: run.yml
          name: core-artifact
          path: core/artifact
          if_no_artifact_found: warn   # 初回実行時は artifact がないため警告のみ

      # 3. Python のセットアップと依存インストール
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r core/requirements.txt

      # 4. 祝日判定
      - name: Check if holiday
        run: |
          python -c "
          import jpholiday
          from datetime import datetime, timezone
          today = datetime.now(timezone.utc).date()
          if jpholiday.is_holiday(today):
              print('Today is a holiday, cancelling workflow')
              exit(1)
          else:
              print('Today is not a holiday, proceeding')
          "

      # 5. run.py を実行
      - name: Run core/run.py
        env:
          CORE_SECRETS_LIST: ${{ secrets.CORE_SECRETS_LIST }}
        run: python core/run.py

      # 6. artifact を保存
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: core-artifact
          path: core/artifact/
          retention-days: 90
          if-no-files-found: error
